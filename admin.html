<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | Broker Brands</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: var(--gray-50); }
        .admin-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            display: none; /* Hidden until login */
        }
        .login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--navy);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .login-box {
            background: white;
            padding: 3rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--gray-700);
        }
        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-md);
            font-family: inherit;
        }
        .product-list {
            margin-top: 2rem;
            border-top: 1px solid var(--gray-200);
            padding-top: 2rem;
        }
        .product-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background: var(--gray-50);
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            border: 1px solid var(--gray-200);
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--gray-200);
        }
        .img-upload-group {
            background: var(--gray-100);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--gray-200);
        }
        .search-box {
            margin-bottom: 1.5rem;
            position: relative;
        }
        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
        }
        .search-box input {
            padding-left: 2.5rem;
        }
        .file-label {
            display: block;
            font-size: 0.7rem;
            margin-top: 5px;
            color: var(--navy);
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="loginScreen" class="login-overlay">
        <div class="login-box">
            <img src="assets/logo.jpg" alt="Logo" style="width: 80px; margin: 0 auto 1.5rem; border-radius: 50%;">
            <h2 style="margin-bottom: 1.5rem;">Acceso Administrativo</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="adminEmail" class="form-input" placeholder="admin@ejemplo.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <input type="password" id="adminPassword" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Ingresar</button>
            </form>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-container">
        <div class="admin-header">
            <div>
                <h2 id="panelTitle">Gestión de Catálogo Completo</h2>
                <p style="font-size: 0.85rem; color: var(--gray-500);">Modo Automático: Subida de imágenes y edición directa</p>
            </div>
            <a href="index.html" class="btn btn-outline" style="padding: 0.5rem 1rem;">Volver a la tienda</a>
        </div>
        
        <form id="addProductForm">
            <input type="hidden" id="pId">
            <h3 id="formActionTitle" style="margin-bottom: 1rem; color: var(--navy);">Agregar Nuevo Producto</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label class="form-label">Nombre del Producto</label>
                    <input type="text" id="pName" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Categoría</label>
                    <select id="pCategory" class="form-input" required>
                        <option value="Computación">Computación</option>
                        <option value="Visualización">Visualización</option>
                        <option value="Impresión">Impresión</option>
                        <option value="Redes">Redes</option>
                        <option value="Audio">Audio</option>
                        <option value="Energía">Energía</option>
                        <option value="Accesorios">Accesorios</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Precio ($)</label>
                    <input type="number" id="pPrice" class="form-input" step="0.01" required>
                </div>
                
                <div class="form-group" style="grid-column: span 2;">
                    <label class="form-label">Galería de Imágenes (Pega URL o sube un archivo)</label>
                    <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.8rem;">
                        <div class="img-upload-group">
                            <input type="url" id="pImage1" class="form-input" placeholder="Img 1" required style="padding: 5px; font-size: 0.8rem;">
                            <input type="file" id="pFile1" style="display:none;" accept="image/*">
                            <label for="pFile1" class="file-label"><i class="fas fa-upload"></i> Subir</label>
                        </div>
                        <div class="img-upload-group">
                            <input type="url" id="pImage2" class="form-input" placeholder="Img 2" style="padding: 5px; font-size: 0.8rem;">
                            <input type="file" id="pFile2" style="display:none;" accept="image/*">
                            <label for="pFile2" class="file-label"><i class="fas fa-upload"></i> Subir</label>
                        </div>
                        <div class="img-upload-group">
                            <input type="url" id="pImage3" class="form-input" placeholder="Img 3" style="padding: 5px; font-size: 0.8rem;">
                            <input type="file" id="pFile3" style="display:none;" accept="image/*">
                            <label for="pFile3" class="file-label"><i class="fas fa-upload"></i> Subir</label>
                        </div>
                        <div class="img-upload-group">
                            <input type="url" id="pImage4" class="form-input" placeholder="Img 4" style="padding: 5px; font-size: 0.8rem;">
                            <input type="file" id="pFile4" style="display:none;" accept="image/*">
                            <label for="pFile4" class="file-label"><i class="fas fa-upload"></i> Subir</label>
                        </div>
                        <div class="img-upload-group">
                            <input type="url" id="pImage5" class="form-input" placeholder="Img 5" style="padding: 5px; font-size: 0.8rem;">
                            <input type="file" id="pFile5" style="display:none;" accept="image/*">
                            <label for="pFile5" class="file-label"><i class="fas fa-upload"></i> Subir</label>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Descripción</label>
                <textarea id="pDesc" class="form-input" rows="3" required></textarea>
            </div>
            
            <div style="display: flex; gap: 0.5rem;">
                <button type="submit" id="submitBtn" class="btn btn-primary">
                    <i class="fas fa-save"></i> Guardar Producto
                </button>
                <button type="button" id="cancelEditBtn" class="btn btn-outline" style="display: none;">
                    Cancelar Edición
                </button>
            </div>
        </form>

        <div class="product-list">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3>Todos los Productos</h3>
                <span id="productCount" style="font-size: 0.85rem; color: var(--gray-500);"></span>
            </div>

            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" class="form-input" placeholder="Buscar por nombre o categoría...">
            </div>

            <div id="productsListContainer">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/data.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
